body {
  margin: 0;
}
/* 3×2グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 220px);
  gap: 16px;
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}
/* カード */
.card {
  display: flex;
  flex-direction: column;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  text-decoration: none;
  color: #222;
  font-family: sans-serif;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s ease, background 0.2s ease;
}
/* 画像（メイン領域） */
.card img {
  width: 100%;
  height: 160px;      /* ← ここで画像を大きく */
  object-fit: cover;
  display: block;
}
/* タイトル（下部） */
.card div {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 10px;
  font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
  font-size: 14px;
  text-align: center;
}
/* ホバー */
.card:hover {
  transform: scale(1.04);
  background: #fcf3fa;
  color: #ff1ac2;
}
/* クリック時 */
.card:active {
  transform: scale(0.98);
}

</style>
